; BodyLink dock body firmware — native ESP-IDF.
;
; Two board targets share one firmware tree; the servo PWM backend is
; chosen at compile time by the IDF target (see src/servo.c):
;
;   seeed_xiao_esp32s3 — XIAO ESP32-S3, 8 MB flash, mcpwm servo backend
;   esp32c3_mini       — ESP32-C3 mini,  4 MB flash, ledc  servo backend
;
; `pio run`                            builds default_envs (the S3).
; `pio run -e esp32c3_mini -t upload`  builds + flashes the C3.
; Everything else (Wi-Fi, station WS link, bodylink proto, OTA, USB
; console) is architecture-independent and identical on both boards.

[platformio]
default_envs = seeed_xiao_esp32s3

; ── Shared settings for every board env ───────────────────────────────
[env]
; Pinned to 6.13.0 — ships ESP-IDF v5.5.3. (7.x switched the toolchain to
; the unified xtensa-esp-elf / riscv32-esp-elf naming; 6.13.0's cached
; install is what we build against — and it carries the riscv32 toolchain
; the C3 needs as well as the xtensa one for the S3.)
platform   = espressif32@6.13.0
framework  = espidf

; Native USB-CDC serial console. CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG=y in
; sdkconfig.defaults routes printf/ESP_LOGI through the chip's native USB
; so /dev/cu.usbmodem* shows logs at 115200. Both the XIAO S3 and the C3
; mini enumerate as a USB-Serial/JTAG device, so this is shared.
monitor_speed = 115200

; Per-layer disable flags. Flip on to isolate one milestone at a time.
;   BL_DISABLE_WIFI   — skip Wi-Fi join + WS server (M1+M2 inert)
build_flags =

; ── XIAO ESP32-S3 (8 MB flash, mcpwm servos) ──────────────────────────
[env:seeed_xiao_esp32s3]
board = seeed_xiao_esp32s3
; Flash size + the 8 MB dual-3 MB-OTA partition table come from
; sdkconfig.defaults.esp32s3 (IDF merges it by chip name). board_build.partitions
; keeps PIO and a raw idf.py build agreeing on the same CSV.
board_build.partitions = partitions.csv

; ── ESP32-C3 mini (4 MB flash, ledc servos) ───────────────────────────
[env:esp32c3_mini]
; Generic C3 devkit board def (mcu esp32c3, 4 MB). Flash size + 4 MB OTA table +
; FULL RF calibration come from sdkconfig.defaults.esp32c3 (merged by chip name).
board = esp32-c3-devkitm-1
board_build.partitions = partitions_4mb.csv
; To re-run the servo wiring smoke test on boot during bring-up, add
; -DBL_SERVO_SWEEP to build_flags here (moves neck then foot through a range).
; Left off for normal builds so the station is the only thing driving the body.

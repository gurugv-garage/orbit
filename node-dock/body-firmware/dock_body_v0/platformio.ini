; ESP-IDF Wi-Fi probe for the BodyLink dock body firmware.
;
; Phase 1 goal: a minimal native ESP-IDF sketch that joins the user's
; Wi-Fi (HackersWebAP / Airtel-Nokia GPON ONT) — the AP that the
; arduino-esp32 stack couldn't pass the 4-way handshake against.
;
; If this probe joins reliably, Phase 2 rewrites the full BodyLink
; firmware on ESP-IDF (native esp_wifi + esp_http_server WS + mcpwm
; servo + FreeRTOS tasks).

[platformio]
default_envs = seeed_xiao_esp32s3

[env:seeed_xiao_esp32s3]
; Pinned to 6.13.0 — ships ESP-IDF v5.5.3, uses chip-specific toolchain
; naming (xtensa-esp32s3-elf-gcc) which our installed toolchain provides.
; 7.x switched to unified xtensa-esp-elf naming which our cached install
; doesn't match.
platform   = espressif32@6.13.0
board      = seeed_xiao_esp32s3
framework  = espidf

; Native USB-CDC serial console. CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG=y
; in sdkconfig.defaults routes printf/ESP_LOGI through the XIAO's
; native USB so /dev/cu.usbmodem* shows logs at 115200.
monitor_speed = 115200

; Per-layer disable flags. Flip on to isolate one milestone at a time.
;   BL_DISABLE_WIFI   — skip Wi-Fi join + WS server (M1+M2 inert)
build_flags =

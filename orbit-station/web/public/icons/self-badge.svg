<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="self">
  <!-- self badge: dark space tile + glowing memory core, concentric growth rings, one bright spark -->
  <!-- styled to match orbit-badge.svg: dark rounded tile, radial-gradient orb, thin accent strokes -->
  <defs>
    <radialGradient id="sbg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#241a40"/>
      <stop offset="100%" stop-color="#070a11"/>
    </radialGradient>
    <radialGradient id="score" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#d9c7ff"/>
      <stop offset="45%" stop-color="#a98bff"/>
      <stop offset="100%" stop-color="#6f52c9"/>
    </radialGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#sbg)"/>
  <!-- faint stars -->
  <circle cx="28" cy="34" r="1.3" fill="#ffffff" opacity="0.6"/>
  <circle cx="100" cy="44" r="1.1" fill="#ffffff" opacity="0.5"/>
  <circle cx="94" cy="98" r="1.5" fill="#ffffff" opacity="0.45"/>
  <circle cx="34" cy="98" r="1.1" fill="#ffffff" opacity="0.5"/>
  <!-- concentric memory / growth rings — accreting outward -->
  <circle cx="64" cy="64" r="46" fill="none" stroke="#8f7bff" stroke-width="1.6" opacity="0.28" stroke-dasharray="2 7"/>
  <circle cx="64" cy="64" r="36" fill="none" stroke="#8f7bff" stroke-width="2" opacity="0.5"/>
  <circle cx="64" cy="64" r="27" fill="none" stroke="#a98bff" stroke-width="2.4" opacity="0.8"/>
  <!-- glowing self core -->
  <circle cx="64" cy="64" r="17" fill="url(#score)"/>
  <!-- a bright spark on the outer ring — the new memory / it evolves -->
  <circle cx="100" cy="64" r="4.5" fill="#5db8ff"/>
  <circle cx="30" cy="82" r="3" fill="#4ad6a0" opacity="0.9"/>
</svg>

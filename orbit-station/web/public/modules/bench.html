<!doctype html>
<meta charset="utf-8">
<title>Dock LLM benchmark</title>
<!--
  Static viewer for the dock-LLM benchmark. No build step — serve bench/ and open:
      cd bench && python3 -m http.server 8090   →   http://localhost:8090/viewer.html
  Reads results/index.json (snapshot list) + the chosen snapshot file(s).
  - Snapshot dropdown: pick which run to view (each embeds the system prompt used).
  - Compare mode: pick a 2nd snapshot → cells show Δ pass-rate vs it (prompt v1 vs v2).
  - Each cell: TWO badges — pass-rate AND Claude's quality grade (1-5) — plus latency.
  - Per case row, the winning model cell(s) are ringed (ties included).
-->
<style>
  :root { --bg:#0e0f13; --fg:#e6e6e6; --dim:#9aa0aa; --line:#262a33; --card:#161922; --win:#d9a441; }
  body { background:var(--bg); color:var(--fg); font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; margin:20px; }
  h1 { font-size:17px; margin:0 0 4px; } .meta { color:var(--dim); margin-bottom:12px; }
  .bar { display:flex; gap:14px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
  select, button { background:var(--card); color:var(--fg); border:1px solid var(--line); border-radius:5px; padding:5px 8px; font:inherit; }
  label { color:var(--dim); }
  table { border-collapse:collapse; width:100%; }
  th,td { border:1px solid var(--line); padding:5px 7px; text-align:left; vertical-align:top; }
  th { background:var(--card); position:sticky; top:0; z-index:1; }
  .cap { background:#11131a; color:var(--dim); font-weight:bold; text-transform:uppercase; letter-spacing:.05em; }
  .win { outline:2px solid var(--win); outline-offset:-2px; }
  .badges { display:flex; gap:6px; align-items:center; }
  .pass { font-weight:bold; } .q { font-size:11px; padding:1px 5px; border-radius:8px; background:#1d2330; }
  .lat { color:var(--dim); font-size:11px; } .delta { font-size:11px; margin-left:4px; }
  .cost { color:#8a9; font-size:10px; margin-top:2px; }
  .issues { font-size:10px; margin-top:3px; color:#e0a96c; font-weight:normal; max-width:160px; }
  .issues summary { color:#e0a96c; cursor:pointer; }
  .issues div { color:#cbb08a; font-weight:normal; margin-top:2px; }
  .clean { font-size:10px; margin-top:3px; color:#5ad17a; font-weight:normal; }
  .up { color:#5ad17a; } .down { color:#e06c6c; } .same { color:var(--dim); }
  details { background:var(--card); border:1px solid var(--line); border-radius:6px; margin:5px 0; padding:7px 9px; }
  summary { cursor:pointer; }
  .run { border-top:1px dashed var(--line); padding:5px 0; }
  .ok { color:#5ad17a; } .no { color:#e06c6c; } .err { color:#e0a96c; }
  .out { white-space:pre-wrap; } .tools { color:#7fb0ff; }
  .qnote { background:#101826; border-left:3px solid var(--win); padding:5px 9px; margin-top:6px; color:#d8d8d8; }
  img.frame { max-width:160px; border:1px solid var(--line); border-radius:4px; display:block; margin:4px 0; }
  .note { color:var(--dim); font-style:italic; }
  pre.prompt { background:#11131a; border:1px solid var(--line); border-radius:6px; padding:10px; white-space:pre-wrap; color:#cdd3dd; max-height:200px; overflow:auto; }
</style>
<h1>Dock LLM benchmark</h1>
<div class="bar">
  <span><label>snapshot</label> <select id="snap"></select></span>
  <span><label>compare vs</label> <select id="cmp"><option value="">(none)</option></select></span>
  <button id="showPrompt">show system prompt</button>
  <span class="meta" id="meta"></span>
</div>
<pre class="prompt" id="prompt" style="display:none"></pre>
<table id="matrix"></table>

<script>
const pctColor = r => `hsl(${Math.round(r*120)},55%,40%)`;
const qColor = q => q==null ? '#444' : `hsl(${Math.round((q-1)/4*120)},50%,38%)`;
const fmtMs = ms => ms>=1000 ? (ms/1000).toFixed(1)+'s' : ms+'ms';
let INDEX=[], CUR=null, CMP=null;

init();
async function init(){
  INDEX = await fetch('/api/bench/results/index.json').then(r=>r.json()).catch(()=>[]);
  if(!INDEX.length){ document.getElementById('meta').textContent='no snapshots yet — run ./gradlew :bench:run'; return; }
  const snap=document.getElementById('snap'), cmp=document.getElementById('cmp');
  for(const e of INDEX){ const o=document.createElement('option'); o.value=e.file; o.textContent=`${e.snapshot}  (${e.ts.slice(0,16).replace('T',' ')})`; snap.appendChild(o);
    const o2=o.cloneNode(true); cmp.appendChild(o2); }
  snap.onchange=load; cmp.onchange=load;
  document.getElementById('showPrompt').onclick=()=>{ const p=document.getElementById('prompt'); p.style.display = p.style.display==='none'?'block':'none'; };
  load();
}
async function load(){
  const snapFile=document.getElementById('snap').value;
  const cmpFile=document.getElementById('cmp').value;
  CUR = await fetch('/api/bench/results/'+snapFile).then(r=>r.json());
  CMP = cmpFile ? await fetch('/api/bench/results/'+cmpFile).then(r=>r.json()) : null;
  document.getElementById('meta').innerHTML = `${CUR.run.snapshot} · ${CUR.run.host} · ${CUR.run.ts.slice(0,16).replace('T',' ')}${CUR.run.note?' · '+CUR.run.note:''}${CMP?` &nbsp;|&nbsp; Δ vs <b>${CMP.run.snapshot}</b>`:''}`;
  document.getElementById('prompt').textContent = CUR.run.systemPrompt || '(no prompt recorded)';
  render();
}

function cmpRate(modelName, capability, id){
  if(!CMP) return null;
  const m=CMP.models.find(x=>x.name===modelName); if(!m) return null;
  const c=m.cases.find(x=>x.id===id&&x.capability===capability); return c?c.passRate:null;
}

function render(){
  const models=CUR.models;
  const order=[]; const seen=new Set();
  models.forEach(m=>m.cases.forEach(c=>{const k=c.capability+'/'+c.id; if(!seen.has(k)){seen.add(k); order.push({capability:c.capability,id:c.id,prompt:c.prompt,image:c.image});}}));
  let html='<tr><th>case</th>'+models.map(m=>{
    const iss = (m.issues&&m.issues.length)
      ? `<details class="issues"><summary>⚠ ${m.issues.length} issue${m.issues.length>1?'s':''}</summary>`
        + m.issues.map(x=>`<div>• ${esc(x)}</div>`).join('') + `</details>`
      : `<div class="clean">✓ no issues found</div>`;
    return `<th>${m.name}<div class="lat">${m.api}${m.vision?' · 👁':''}</div><div class="cost">${esc(m.cost||'free')}</div>${iss}</th>`;
  }).join('')+'</tr>';
  let lastCap=null;
  for(const row of order){
    if(row.capability!==lastCap){ html+=`<tr><td class="cap" colspan="${models.length+1}">${row.capability}</td></tr>`; lastCap=row.capability; }
    // Winner(s) per row = best by (passRate, then quality). TIES on both are
    // co-winners — all ringed (latency is shown but never breaks a visual tie).
    const cells=models.map(m=>({m, c:m.cases.find(x=>x.id===row.id&&x.capability===row.capability)})).filter(x=>x.c);
    const key=c=>c.passRate*100 + ((c.quality&&c.quality.score)||0);   // pass dominates, quality breaks
    const bestVal=Math.max(...cells.map(x=>key(x.c)));
    html+=`<tr><td><b>${row.id}</b><br><span class="note">${esc(row.prompt)}</span></td>`;
    for(const m of models){
      const x=cells.find(y=>y.m.name===m.name);
      if(!x){ html+='<td><span class="lat">—</span></td>'; continue; }
      const isWin = Math.abs(key(x.c)-bestVal)<1e-6 && x.c.passRate>0;
      html+=`<td class="${isWin?'win':''}">${cell(m,x.c,row)}</td>`;
    }
    html+='</tr>';
  }
  document.getElementById('matrix').innerHTML=html;
}

function cell(model,c,row){
  const q=c.quality&&c.quality.score;
  const prior=cmpRate(model.name,c.capability,c.id);
  let delta='';
  if(prior!=null){ const d=Math.round((c.passRate-prior)*100); const cls=d>0?'up':d<0?'down':'same'; delta=`<span class="delta ${cls}">${d>0?'▲':d<0?'▼':'='}${d!==0?Math.abs(d)+'%':''}</span>`; }
  const head=`<div class="badges">
    <span class="pass" style="color:${pctColor(c.passRate)}">${Math.round(c.passRate*100)}%</span>${delta}
    <span class="q" style="background:${qColor(q)}" title="Claude quality grade">${q!=null?'★'+q:'★ —'}</span>
  </div><div class="lat">n=${c.n} · p50 ${fmtMs(c.latency.p50)} · 1st ${fmtMs(c.latency.firstEventP50)}</div>`;
  const runs=(c.runs||[]).map(r=>`<div class="run">
      <span class="${r.error?'err':(r.pass?'ok':'no')}">${r.error?'ERR':(r.pass?'PASS':'fail')}</span>
      <span class="lat">${fmtMs(r.ms)}</span>
      ${r.toolCalls&&r.toolCalls.length?`<div class="tools">▶ ${r.toolCalls.map(t=>t.name+' '+t.args).join(' , ')}</div>`:''}
      ${r.output?`<div class="out">${esc(r.output)}</div>`:''}
      ${r.error?`<div class="err">${esc(r.error)}</div>`:''}
    </div>`).join('');
  const img=c.image?`<img class="frame" src="/api/bench/images/${c.image}" alt="${c.image}">`:'';
  const qn=c.quality?`<div class="qnote">★ ${c.quality.score!=null?c.quality.score+'/5 — ':''}${esc(c.quality.notes||'')}</div>`:'';
  const obj=Object.entries(c.objective||{}).map(([k,v])=>`${k} ${v}`).join(' · ');
  return `<details><summary>${head}</summary><div class="note">${obj}</div>${img}${runs}${qn}</details>`;
}
function esc(s){return (s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
</script>
